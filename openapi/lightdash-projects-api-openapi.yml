              schema:
                $ref: '#/components/schemas/ApiSuccessEmpty'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Check if the user is authenticated with Snowflake SSO
      summary: Check Snowflake SSO authentication
      tags:
      - Projects
      security: []
      parameters: []
