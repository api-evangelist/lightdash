                      - urn:ietf:params:scim:schemas:core:2.0:Schema
                      id: urn:ietf:params:scim:schemas:extension:2.0:Role
                      name: Role
                      description: Role Schema
                      attributes:
                      - name: value
                        type: string
                        multiValued: false
                        description: The value of the role
                        required: true
                        caseExact: false
                        mutability: readOnly
                        returned: default
                        uniqueness: none
                      - name: display
                        type: string
                        multiValued: false
                        description: Human-readable name for the role
                        required: false
                        caseExact: false
                        mutability: readOnly
                        returned: default
                        uniqueness: none
                      - name: type
                        type: string
                        multiValued: false
                        description: Label indicating the role function
                        required: false
                        caseExact: false
                        mutability: readOnly
                        returned: default
                        uniqueness: none
                      - name: supported
                        type: boolean
                        multiValued: false
                        description: Boolean indicating if the role is usable
                        required: true
                        caseExact: false
                        mutability: readOnly
                        returned: default
                        uniqueness: none
