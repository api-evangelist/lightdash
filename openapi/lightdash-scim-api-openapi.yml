        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScimListResponse_ScimUser_'
              examples:
                Example 1:
                  value:
                    schemas:
                    - urn:ietf:params:scim:api:messages:2.0:ListResponse
                    totalResults: 1
                    itemsPerPage: 1
                    startIndex: 1
                    Resources:
                    - schemas:
                      - urn:ietf:params:scim:schemas:core:2.0:User
                      id: e0dd2003-c291-4e14-b977-7a03b7edc842
                      userName: demo3@lightdash.com
                      name:
                        givenName: Viewer
                        familyName: User
                      active: true
                      emails:
                      - value: demo3@lightdash.com
                        primary: true
                      roles:
                      - value: viewer
                        display: Viewer
                        type: Organization
                      - value: 3675b69e-8324-4110-bdca-059031aa8da3:editor
                        display: Jaffle shop - Editor
                        type: Project - Jaffle shop
                        primary: false
                      meta:
                        resourceType: User
                        created: '2025-11-03T14:22:18.464Z'
                        lastModified: '2025-11-05T15:04:02.687Z'
                        location: https://<tenant>.lightdash.cloud/api/v1/scim/v2/Users/e0dd2003-c291-4e14-b977-7a03b7edc842
      description: List SCIM users in the organization
      summary: List users
      tags:
      - SCIM
      security: []
      parameters:
      - description: 'SCIM filter string (optional). See: https://bookstack.soffid.com/books/scim/page/scim-query-syntax'
        in: query
        name: filter
        required: false
        schema:
          type: string
      - description: 1-based index of the first result to return (optional)
        in: query
        name: startIndex
        required: false
        schema:
          format: double
          type: number
      - description: Maximum number of results to return (optional)
        in: query
        name: count
        required: false
        schema:
          format: double
          type: number
    post:
      operationId: CreateScimUser
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScimUser'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScimUser'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScimErrorPayload'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScimErrorPayload'
      description: Create a new user
      summary: Create user
      tags:
      - SCIM
      security: []
      parameters: []
      requestBody:
        description: User to create
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScimUpsertUser'
              description: User to create
