        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScimErrorPayload'
      description: Patch a user by ID (SCIM PATCH)
      summary: Patch user
      tags:
      - SCIM
      security: []
      parameters:
      - description: UUID of the user to patch
        in: path
        name: userUuid
        required: true
        schema:
          type: string
      requestBody:
        description: Patch operations to apply
        required: true
        content:
          application/json:
