openapi: 3.0.0
info:
  title: Lightdash AiAgents Schedulers API
  version: 0.3156.1
  description: 'Open API documentation for all public Lightdash API endpoints. # Authentication Before you get started, you might need to create a Personal Access Token to authenticate via the API. You can create a token by following this guide: https://docs.lightdash.com/references/personal_tokens

    '
  license:
    name: MIT
  contact:
    name: Lightdash Support
    email: support@lightdash.com
    url: https://docs.lightdash.com/help-and-contact/contact/contact_info/
servers:
- url: /
tags:
- name: Schedulers
paths:
  /api/v1/schedulers/{projectUuid}/logs:
    get:
      operationId: getSchedulerLogs
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSchedulerLogsResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get scheduled logs
      summary: Get scheduler logs
      tags:
      - Schedulers
      deprecated: true
      security: []
      parameters:
      - description: The uuid of the project
        in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - description: number of items per page
        in: query
        name: pageSize
        required: false
        schema:
          format: double
          type: number
      - description: page number
        in: query
        name: page
        required: false
        schema:
          format: double
          type: number
      - description: search query to filter logs by scheduler name
        in: query
        name: searchQuery
        required: false
        schema:
          type: string
      - description: filter by log statuses (comma-separated)
        in: query
        name: statuses
        required: false
        schema:
          type: string
      - description: filter by creator user UUIDs (comma-separated)
        in: query
        name: createdByUserUuids
        required: false
        schema:
          type: string
      - description: 'filter by destination types (comma-separated: email, slack, msteams, googlechat)'
        in: query
        name: destinations
        required: false
        schema:
          type: string
  /api/v1/schedulers/{projectUuid}/runs:
    get:
      operationId: getSchedulerRuns
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSchedulerRunsResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get paginated scheduler runs with aggregated child job counts
      summary: List scheduler runs
      tags:
      - Schedulers
      security: []
      parameters:
      - description: The uuid of the project
        in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - description: number of items per page
        in: query
        name: pageSize
        required: false
        schema:
          format: double
          type: number
      - description: page number
        in: query
        name: page
        required: false
        schema:
          format: double
          type: number
      - description: search query to filter runs by scheduler name
        in: query
        name: searchQuery
        required: false
        schema:
          type: string
      - description: column to sort by (scheduledTime, createdAt)
        in: query
        name: sortBy
        required: false
        schema:
          type: string
          enum:
          - scheduledTime
          - createdAt
      - description: sort direction (asc or desc)
        in: query
        name: sortDirection
        required: false
        schema:
          type: string
          enum:
          - asc
          - desc
      - description: filter by specific scheduler UUIDs (comma-separated)
        in: query
        name: schedulerUuids
        required: false
        schema:
          type: string
      - description: 'filter by run statuses (comma-separated: completed, partial_failure, failed, running, scheduled)'
        in: query
        name: statuses
        required: false
        schema:
          type: string
      - description: filter by creator user UUIDs (comma-separated)
        in: query
        name: createdByUserUuids
        required: false
        schema:
          type: string
      - description: 'filter by destination types (comma-separated: email, slack, msteams, googlechat)'
        in: query
        name: destinations
        required: false
        schema:
          type: string
      - description: filter by resource type (chart or dashboard)
        in: query
        name: resourceType
        required: false
        schema:
          type: string
          enum:
          - chart
          - dashboard
      - description: filter by resource UUIDs (comma-separated)
        in: query
        name: resourceUuids
        required: false
        schema:
          type: string
  /api/v1/schedulers/runs/{runId}/logs:
    get:
      operationId: getRunLogs
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSchedulerRunLogsResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get detailed logs for a specific scheduler run
      summary: Get run logs
      tags:
      - Schedulers
      security: []
      parameters:
      - description: The ID of the run (parent job ID)
        in: path
        name: runId
        required: true
        schema:
          type: string
  /api/v1/schedulers/user-schedulers:
    get:
      operationId: listUserSchedulers
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSchedulersResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: List all schedulers for the current user across all projects with pagination, search, sorting, and filtering
      summary: List user schedulers
      tags:
      - Schedulers
      security: []
      parameters:
      - description: number of items per page
        in: query
        name: pageSize
        required: false
        schema:
          format: double
          type: number
      - description: page number
        in: query
        name: page
        required: false
        schema:
          format: double
          type: number
      - description: search query to filter schedulers by name
        in: query
        name: searchQuery
        required: false
        schema:
          type: string
      - description: column to sort by
        in: query
        name: sortBy
        required: false
        schema:
          type: string
          enum:
          - name
          - createdAt
      - description: sort direction (asc or desc)
        in: query
        name: sortDirection
        required: false
        schema:
          type: string
          enum:
          - asc
          - desc
      - description: filter by scheduler formats (comma-separated)
        in: query
        name: formats
        required: false
        schema:
          type: string
      - description: filter by resource type (chart or dashboard)
        in: query
        name: resourceType
        required: false
        schema:
          type: string
          enum:
          - chart
          - dashboard
      - description: filter by resource UUIDs (comma-separated)
        in: query
        name: resourceUuids
        required: false
        schema:
          type: string
      - description: 'filter by destination types (comma-separated: email, slack, msteams, googlechat)'
        in: query
        name: destinations
        required: false
        schema:
          type: string
      - description: include latest run information for each scheduler
        in: query
        name: includeLatestRun
        required: false
        schema:
          type: boolean
  /api/v1/schedulers/{projectUuid}/list:
    get:
      operationId: ListSchedulers
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSchedulersResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: List all schedulers with pagination, search, sorting, and filtering
      summary: List schedulers
      tags:
      - Schedulers
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - description: number of items per page
        in: query
        name: pageSize
        required: false
        schema:
          format: double
          type: number
      - description: page number
        in: query
        name: page
        required: false
        schema:
          format: double
          type: number
      - description: search query to filter schedulers by name
        in: query
        name: searchQuery
        required: false
        schema:
          type: string
      - description: column to sort by
        in: query
        name: sortBy
        required: false
        schema:
          type: string
          enum:
          - name
          - createdAt
      - description: sort direction (asc or desc)
        in: query
        name: sortDirection
        required: false
        schema:
          type: string
          enum:
          - asc
          - desc
      - description: filter by creator user UUIDs (comma-separated)
        in: query
        name: createdByUserUuids
        required: false
        schema:
          type: string
      - description: filter by scheduler formats (comma-separated)
        in: query
        name: formats
        required: false
        schema:
          type: string
      - description: filter by resource type (chart or dashboard)
        in: query
        name: resourceType
        required: false
        schema:
          type: string
          enum:
          - chart
          - dashboard
      - description: filter by resource UUIDs (comma-separated)
        in: query
        name: resourceUuids
        required: false
        schema:
          type: string
      - description: 'filter by destination types (comma-separated: email, slack, msteams, googlechat)'
        in: query
        name: destinations
        required: false
        schema:
          type: string
      - in: query
        name: includeLatestRun
        required: false
        schema:
          type: boolean
  /api/v1/schedulers/{schedulerUuid}:
    get:
      operationId: getScheduler
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSchedulerAndTargetsResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get a scheduler
      summary: Get scheduler
      tags:
      - Schedulers
      security: []
      parameters:
      - description: The uuid of the scheduler to update
        in: path
        name: schedulerUuid
        required: true
        schema:
          type: string
    patch:
      operationId: updateScheduler
      responses:
        '201':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSchedulerAndTargetsResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Update a scheduler
      summary: Update scheduler
      tags:
      - Schedulers
      security: []
      parameters:
      - description: The uuid of the scheduler to update
        in: path
        name: schedulerUuid
        required: true
        schema:
          type: string
      requestBody:
        description: the new scheduler data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnyType'
              description: the new scheduler data
    delete:
      operationId: deleteScheduler
      responses:
        '201':
          description: Deleted
          content:
            application/json:
              schema:
                properties:
                  results: {}
                  status:
                    type: string
                    enum:
                    - ok
                    nullable: false
                required:
                - status
                type: object
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Delete a scheduler
      summary: Delete scheduler
      tags:
      - Schedulers
      security: []
      parameters:
      - description: The uuid of the scheduler to delete
        in: path
        name: schedulerUuid
        required: true
        schema:
          type: string
  /api/v1/schedulers/{schedulerUuid}/enabled:
    patch:
      operationId: updateSchedulerEnabled
      responses:
        '201':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSchedulerAndTargetsResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Set scheduler enabled
      summary: Update scheduler enabled status
      tags:
      - Schedulers
      security: []
      parameters:
      - description: The uuid of the scheduler to update
        in: path
        name: schedulerUuid
        required: true
        schema:
          type: string
      requestBody:
        description: the enabled flag
        required: true
        content:
          application/json:
            schema:
              properties:
                enabled:
                  type: boolean
              required:
              - enabled
              type: object
              description: the enabled flag
  /api/v1/schedulers/{projectUuid}/reassign-owner:
    patch:
      operationId: reassignSchedulerOwner
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiReassignSchedulerOwnerResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Reassign ownership of multiple schedulers
      summary: Reassign scheduler owner
      tags:
      - Schedulers
      security: []
      parameters:
      - description: The uuid of the project
        in: path
        name: projectUuid
        required: true
        schema:
          type: string
      requestBody:
        description: the scheduler UUIDs and new owner UUID
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReassignSchedulerOwnerRequest'
              description: the scheduler UUIDs and new owner UUID
  /api/v1/schedulers/{schedulerUuid}/jobs:
    get:
      operationId: getScheduledJobs
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiScheduledJobsResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get scheduled jobs
      summary: Get scheduled jobs
      tags:
      - Schedulers
      deprecated: true
      security: []
      parameters:
      - description: The uuid of the scheduler to update
        in: path
        name: schedulerUuid
        required: true
        schema:
          type: string
  /api/v1/schedulers/job/{jobId}/status:
    get:
      operationId: getSchedulerJobStatus
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiJobStatusResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: 'Get a generic job status

        This method can be used when polling from the frontend'
      summary: Get scheduler job status
      tags:
      - Schedulers
      security: []
      parameters:
      - description: the jobId for the status to check
        in: path
        name: jobId
        required: true
        schema:
          type: string
  /api/v1/schedulers/send:
    post:
      operationId: sendScheduler
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiTestSchedulerResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Send a scheduler now before saving it
      summary: Send scheduler
      tags:
      - Schedulers
      security: []
      parameters: []
      requestBody:
        description: the create scheduler data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnyType'
              description: the create scheduler data
  /api/v1/schedulers/{schedulerUuid}/send:
    post:
      operationId: sendSchedulerByUuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiTestSchedulerResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Send an existing scheduler now by its uuid
      summary: Send scheduler by uuid
      tags:
      - Schedulers
      security: []
      parameters:
      - description: The uuid of the scheduler to send now
        in: path
        name: schedulerUuid
        required: true
        schema:
          type: string
components:
  schemas:
    SchedulerResourceType:
      enum:
      - chart
      - dashboard
      - sqlChart
      - app
      type: string
    DashboardFilterRule:
      allOf:
      - $ref: '#/components/schemas/FilterRule_FilterOperator.DashboardFieldTarget.AnyType.AnyType_'
      - properties:
          lockedTabUuids:
            items:
              type: string
            type: array
            description: 'Tab UUIDs where this filter is locked. When the active tab is in this

              list, viewers see the filter but cannot change it, and URL / embed

              filter overrides targeting the same field are ignored on that tab.

              Empty or omitted means the filter is not locked anywhere.'
          singleValue:
            type: boolean
          label:
            type: string
          tileTargets:
            $ref: '#/components/schemas/Record_string.DashboardTileTarget_'
        type: object
    SchedulerPdfOptions:
      $ref: '#/components/schemas/Record_string.never_'
    SchedulerImageOptions:
      properties:
        withPdf:
          type: boolean
      type: object
    KnexPaginatedData_SchedulerAndTargets-Array_:
      properties:
        pagination:
          allOf:
          - $ref: '#/components/schemas/KnexPaginateArgs'
          - properties:
              totalResults:
                type: number
                format: double
              totalPageCount:
                type: number
                format: double
            required:
            - totalResults
            - totalPageCount
            type: object
        data:
          items:
            $ref: '#/components/schemas/SchedulerAndTargets'
          type: array
      required:
      - data
      type: object
    SchedulerWithLogs:
      properties:
        logs:
          items:
            $ref: '#/components/schemas/SchedulerLog'
          type: array
        dashboards:
          items:
            properties:
              dashboardUuid:
                type: string
              name:
                type: string
            required:
            - dashboardUuid
            - name
            type: object
          type: array
        charts:
          items:
            properties:
              savedChartUuid:
                type: string
              name:
                type: string
            required:
            - savedChartUuid
            - name
            type: object
          type: array
        users:
          items:
            properties:
              userUuid:
                type: string
              lastName:
                type: string
              firstName:
                type: string
            required:
            - userUuid
            - lastName
            - firstName
            type: object
          type: array
        schedulers:
          items:
            $ref: '#/components/schemas/SchedulerAndTargets'
          type: array
      required:
      - logs
      - dashboards
      - charts
      - users
      - schedulers
      type: object
    DashboardTileTarget:
      anyOf:
      - $ref: '#/components/schemas/DashboardFieldTarget'
      - type: boolean
        enum:
        - false
    Record_string.ParameterValue_:
      properties: {}
      additionalProperties:
        $ref: '#/components/schemas/ParameterValue'
      type: object
      description: Construct a type with a set of properties K of type T
    ApiSuccess_KnexPaginatedData_SchedulerAndTargets-Array__:
      properties:
        results:
          $ref: '#/components/schemas/KnexPaginatedData_SchedulerAndTargets-Array_'
        status:
          type: string
          enum:
          - ok
          nullable: false
      required:
      - results
      - status
      type: object
    SchedulerRunStatus:
      enum:
      - completed
      - partial_failure
      - failed
      - running
      - scheduled
      type: string
    ApiTestSchedulerResponse:
      properties:
        results:
          properties:
            jobId:
              type: string
          required:
          - jobId
          type: object
        status:
          type: string
          enum:
          - ok
          nullable: false
      required:
      - results
      - status
      type: object
    SchedulerRunLogsResponse:
      properties:
        createdByUserName:
          type: string
        createdByUserUuid:
          type: string
        resourceName:
          type: string
        resourceUuid:
          type: string
        resourceType:
          $ref: '#/components/schemas/SchedulerResourceType'
        logs:
          items:
            $ref: '#/components/schemas/SchedulerRunLog'
          type: array
        scheduledTime:
          type: string
          format: date-time
        schedulerName:
          type: string
        schedulerUuid:
          type: string
        runId:
          type: string
      required:
      - createdByUserName
      - createdByUserUuid
      - resourceName
      - resourceUuid
      - resourceType
      - logs
      - scheduledTime
      - schedulerName
      - schedulerUuid
      - runId
      type: object
    KnexPaginatedData_SchedulerWithLogs_:
      properties:
        pagination:
          allOf:
          - $ref: '#/components/schemas/KnexPaginateArgs'
          - properties:
              totalResults:
                type: number
                format: double
              totalPageCount:
                type: number
                format: double
            required:
            - totalResults
            - totalPageCount
            type: object
        data:
          $ref: '#/components/schemas/SchedulerWithLogs'
      required:
      - data
      type: object
    SchedulerFormat:
      enum:
      - csv
      - xlsx
      - image
      - gsheets
      - pdf
      type: string
    SchedulerRun:
      properties:
        format:
          $ref: '#/components/schemas/SchedulerFormat'
        createdByUserName:
          type: string
        createdByUserUuid:
          type: string
        resourceName:
          type: string
        resourceUuid:
          type: string
        resourceType:
          $ref: '#/components/schemas/SchedulerResourceType'
        logCounts:
          $ref: '#/components/schemas/LogCounts'
        details:
          allOf:
          - $ref: '#/components/schemas/Record_string.AnyType_'
          nullable: true
        createdAt:
          type: string
          format: date-time
        runStatus:
          $ref: '#/components/schemas/SchedulerRunStatus'
        status:
          $ref: '#/components/schemas/SchedulerJobStatus'
        scheduledTime:
          type: string
          format: date-time
        schedulerName:
          type: string
        schedulerUuid:
          type: string
        runId:
          type: string
      required:
      - format
      - createdByUserName
      - createdByUserUuid
      - resourceName
      - resourceUuid
      - resourceType
      - logCounts
      - details
      - createdAt
      - runStatus
      - status
      - scheduledTime
      - schedulerName
      - schedulerUuid
      - runId
      type: object
    DashboardFieldTarget:
      properties:
        fallbackType:
          $ref: '#/components/schemas/DimensionType'
        isSqlColumn:
          type: boolean
        tableName:
          type: string
        fieldId:
          type: string
      required:
      - tableName
      - fieldId
      type: object
    ApiSuccess_KnexPaginatedData_SchedulerRun-Array__:
      properties:
        results:
          $ref: '#/components/schemas/KnexPaginatedData_SchedulerRun-Array_'
        status:
          type: string
          enum:
          - ok
          nullable: false
      required:
      - results
      - status
      type: object
    SchedulerGsheetsOptions:
      properties:
        tabName:
          type: string
        url:
          type: string
        gdriveOrganizationName:
          type: string
        gdriveName:
          type: string
        gdriveId:
          type: string
      required:
      - url
      - gdriveOrganizationName
      - gdriveName
      - gdriveId
      type: object
    SchedulerMsTeamsTarget:
      properties:
        webhook:
          type: string
        schedulerUuid:
          type: string
        updatedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        schedulerMsTeamsTargetUuid:
          type: string
      required:
      - webhook
      - schedulerUuid
      - updatedAt
      - createdAt
      - schedulerMsTeamsTargetUuid
      type: object
    SchedulerJobStatus:
      enum:
      - scheduled
      - started
      - completed
      - error
      type: string
    KnexPaginatedData_SchedulerRun-Array_:
      properties:
        pagination:
          allOf:
          - $ref: '#/components/schemas/KnexPaginateArgs'
          - properties:
              totalResults:
                type: number
                format: double
              totalPageCount:
                type: number
                format: double
            required:
            - totalResults
            - totalPageCount
            type: object
        data:
          items:
