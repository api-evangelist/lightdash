openapi: 3.0.0
info:
  title: Lightdash AiAgents SQL runner API
  version: 0.3156.1
  description: 'Open API documentation for all public Lightdash API endpoints. # Authentication Before you get started, you might need to create a Personal Access Token to authenticate via the API. You can create a token by following this guide: https://docs.lightdash.com/references/personal_tokens

    '
  license:
    name: MIT
  contact:
    name: Lightdash Support
    email: support@lightdash.com
    url: https://docs.lightdash.com/help-and-contact/contact/contact_info/
servers:
- url: /
tags:
- name: SQL runner
paths:
  /api/v1/projects/{projectUuid}/sqlRunner/tables:
    get:
      operationId: getTables
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiWarehouseTablesCatalog'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get warehouse tables for a project
      summary: List warehouse tables
      tags:
      - SQL runner
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/sqlRunner/fields:
    get:
      operationId: getTableFields
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiWarehouseTableFields'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get fields for a warehouse table
      summary: Get table fields
      tags:
      - SQL runner
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - in: query
        name: tableName
        required: false
        schema:
          type: string
      - in: query
        name: schemaName
        required: false
        schema:
          type: string
      - in: query
        name: databaseName
        required: false
        schema:
          type: string
  /api/v1/projects/{projectUuid}/sqlRunner/run:
    post:
      operationId: runSql
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiJobScheduledResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Run a SQL query
      summary: Run SQL query
      tags:
      - SQL runner
      deprecated: true
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SqlRunnerBody'
  /api/v1/projects/{projectUuid}/sqlRunner/runPivotQuery:
    post:
      operationId: runSqlPivotQuery
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiJobScheduledResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Run a SQL pivot query
      summary: Run SQL pivot query
      tags:
      - SQL runner
      deprecated: true
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SqlRunnerPivotQueryBody'
  /api/v1/projects/{projectUuid}/sqlRunner/results/{fileId}:
    get:
      operationId: getLocalResults
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnyType'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get results from a file stored locally
      summary: Get stored results
      tags:
      - SQL runner
      deprecated: true
      security: []
      parameters:
      - description: the fileId for the file
        in: path
        name: fileId
        required: true
        schema:
          type: string
      - description: the uuid for the project
        in: path
        name: projectUuid
        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/sqlRunner/saved/{uuid}:
    get:
      operationId: getSavedSqlChart
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSqlChart'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get saved sql chart
      summary: Get SQL chart
      tags:
      - SQL runner
      security: []
      parameters:
      - description: the uuid for the saved sql chart
        in: path
        name: uuid
        required: true
        schema:
          type: string
      - description: the uuid for the project
        in: path
        name: projectUuid
        required: true
        schema:
          type: string
    patch:
      operationId: updateSqlChart
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiUpdateSqlChart'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Update sql chart
      summary: Update SQL chart
      tags:
      - SQL runner
      security: []
      parameters:
      - description: the uuid for the project
        in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - description: the uuid for the saved sql chart
        in: path
        name: uuid
        required: true
        schema:
          type: string
      requestBody:
        description: the sql chart details to update
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSqlChart'
              description: the sql chart details to update
    delete:
      operationId: deleteSqlChart
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessEmpty'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Delete sql chart
      summary: Delete SQL chart
      tags:
      - SQL runner
      security: []
      parameters:
      - description: the uuid for the project
        in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - description: the uuid for the saved sql chart
        in: path
        name: uuid
        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/sqlRunner/saved/slug/{slug}:
    get:
      operationId: getSavedSqlChartBySlug
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSqlChart'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get saved sql chart
      summary: Get SQL chart by slug
      tags:
      - SQL runner
      security: []
      parameters:
      - description: the slug for the saved sql chart
        in: path
        name: slug
        required: true
        schema:
          type: string
      - description: the uuid for the project
        in: path
        name: projectUuid
        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/sqlRunner/saved/slug/{slug}/results-job:
    get:
      operationId: getSavedSqlResultsJob
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiJobScheduledResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Schedules a job to get its results
      summary: Get SQL chart results job
      tags:
      - SQL runner
      deprecated: true
      security: []
      parameters:
      - description: '- the slug of the saved chart'
        in: path
        name: slug
        required: true
        schema:
          type: string
      - description: '- the uuid of the project'
        in: path
        name: projectUuid
        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/sqlRunner/saved/{uuid}/results-job:
    get:
      operationId: getSavedSqlResultsJobByUuid
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiJobScheduledResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Schedules a job to get its results
      summary: Get SQL chart results job by UUID
      tags:
      - SQL runner
      deprecated: true
      security: []
      parameters:
      - description: '- the uuid of the saved chart'
        in: path
        name: uuid
        required: true
        schema:
          type: string
      - description: '- the uuid of the project'
        in: path
        name: projectUuid
        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/sqlRunner/saved:
    post:
      operationId: createSqlChart
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiCreateSqlChart'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Create sql chart
      summary: Create SQL chart
      tags:
      - SQL runner
      security: []
      parameters:
      - description: the uuid for the project
        in: path
        name: projectUuid
        required: true
        schema:
          type: string
      requestBody:
        description: the sql chart to create
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSqlChart'
              description: the sql chart to create
  /api/v1/projects/{projectUuid}/sqlRunner/saved/{uuid}/promote:
    post:
      operationId: promoteSqlChart
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSqlChart'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Promote SQL chart to upstream project
      summary: Promote SQL chart
      tags:
      - SQL runner
      security: []
      parameters:
      - description: the uuid for the project
        in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - description: the uuid for the saved sql chart
        in: path
        name: uuid
        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/sqlRunner/saved/{uuid}/promoteDiff:
    get:
      operationId: promoteSqlChartDiff
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiPromotionChangesResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get diff from SQL chart to promote
      summary: Get SQL chart promotion diff
      tags:
      - SQL runner
      security: []
      parameters:
      - description: the uuid for the project
        in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - description: the uuid for the saved sql chart
        in: path
        name: uuid
        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/sqlRunner/refresh-catalog:
    post:
      operationId: refreshSqlRunnerCatalog
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessEmpty'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Refresh the catalog cache
      summary: Refresh catalog cache
      tags:
      - SQL runner
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/sqlRunner/virtual-view:
    post:
      operationId: createVirtualView
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiCreateVirtualView'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Create a virtual-view
      summary: Create virtual view
      tags:
      - SQL runner
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVirtualViewPayload'
  /api/v1/projects/{projectUuid}/sqlRunner/virtual-view/{name}:
    put:
      operationId: updateVirtualView
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiCreateVirtualView'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Update a virtual view
      summary: Update virtual view
      tags:
      - SQL runner
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - in: path
        name: name
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVirtualViewPayload'
    delete:
      operationId: deleteVirtualView
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessEmpty'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Delete a virtual-view
      summary: Delete virtual view
      tags:
      - SQL runner
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - in: path
        name: name
        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/sqlRunner/preview:
    post:
      operationId: writeBackPreview
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiGithubDbtWritePreview'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Preview write back from SQL runner
      summary: Preview write back
      tags:
      - SQL runner
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVirtualViewPayload'
  /api/v1/projects/{projectUuid}/sqlRunner/pull-request:
    post:
      operationId: writeBackCreatePr
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiGithubDbtWriteBack'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Write back from SQL runner
      summary: Create write back PR
      tags:
      - SQL runner
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVirtualViewPayload'
  /api/v1/projects/{projectUuid}/sqlRunner/saved/{savedSqlUuid}/schedulers:
    get:
      operationId: getSqlChartSchedulers
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                properties:
                  results:
                    items:
                      $ref: '#/components/schemas/SchedulerAndTargets'
                    type: array
                  status:
                    type: string
                    enum:
                    - ok
                    nullable: false
                required:
                - results
                - status
                type: object
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get all schedulers for a SQL chart
      summary: List SQL chart schedulers
      tags:
      - SQL runner
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - in: path
        name: savedSqlUuid
        required: true
        schema:
          type: string
    post:
      operationId: createSqlChartScheduler
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                properties:
                  results:
                    $ref: '#/components/schemas/SchedulerAndTargets'
                  status:
                    type: string
                    enum:
                    - ok
                    nullable: false
                required:
                - results
                - status
                type: object
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Create a scheduler for a SQL chart
      summary: Create SQL chart scheduler
      tags:
      - SQL runner
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - in: path
        name: savedSqlUuid
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSchedulerAndTargetsWithoutIds'
components:
  schemas:
    OrganizationMemberRole:
      enum:
      - member
      - viewer
      - interactive_viewer
      - editor
      - developer
      - admin
      type: string
    ResolvedProjectColorPalette:
      properties:
        source:
          $ref: '#/components/schemas/ColorPaletteSource'
        paletteName:
          type: string
          nullable: true
        paletteUuid:
          type: string
          nullable: true
        darkColors:
          items:
            type: string
          type: array
          nullable: true
        colors:
          items:
            type: string
          type: array
      required:
      - source
      - paletteName
      - paletteUuid
      - darkColors
      - colors
      type: object
    MapHexbinSizingMode:
      enum:
      - dynamic
      - fixed
      type: string
    CreateSchedulerTarget:
      anyOf:
      - $ref: '#/components/schemas/Pick_SchedulerSlackTarget.channel_'
      - $ref: '#/components/schemas/Pick_SchedulerMsTeamsTarget.webhook_'
      - $ref: '#/components/schemas/Pick_SchedulerGoogleChatTarget.googleChatWebhook_'
      - $ref: '#/components/schemas/Pick_SchedulerEmailTarget.recipient_'
    MarkLine:
      properties:
        label:
          properties:
            formatter:
              type: string
              description: Label formatter
          type: object
          description: Label configuration
        lineStyle:
          properties:
            type:
              type: string
              description: Line type
            width:
              type: number
              format: double
              description: Line width
            color:
              type: string
              description: Line color
          required:
          - type
          - width
          - color
          type: object
          description: Line style configuration
        symbol:
          type: string
          description: Symbol at line endpoints
        data:
          items:
            $ref: '#/components/schemas/MarkLineData'
          type: array
          description: Reference line data points
      required:
      - data
      type: object
    ApiErrorPayload:
      properties:
        error:
          properties:
            data:
              $ref: '#/components/schemas/AnyType'
              description: Optional data containing details of the error
            message:
              type: string
              description: A friendly message summarising the error
            name:
              type: string
              description: Unique name for the type of error
            statusCode:
              type: number
              format: integer
              description: HTTP status code
          required:
          - name
          - statusCode
          type: object
        status:
          type: string
          enum:
          - error
          nullable: false
      required:
      - error
      - status
      type: object
      description: 'The Error object is returned from the api any time there is an error.

        The message contains'
    FilterGroup:
      anyOf:
      - $ref: '#/components/schemas/OrFilterGroup'
      - $ref: '#/components/schemas/AndFilterGroup'
    PivotReference:
      properties:
        pivotValues:
          items:
            $ref: '#/components/schemas/PivotValue'
          type: array
          description: Pivot values for this reference (for pivoted data)
        field:
          type: string
          description: Field ID being referenced
      required:
      - field
      type: object
    Pick_Dimension.formatOptions_:
      properties:
        formatOptions:
          $ref: '#/components/schemas/CustomFormat'
      type: object
      description: From T, pick a set of properties whose keys are in the union K
    DashboardChartTileProperties:
      properties:
        properties:
          properties:
            chartSlug:
              type: string
              nullable: true
            lastVersionChartKind:
              allOf:
              - $ref: '#/components/schemas/ChartKind'
              nullable: true
            chartName:
              type: string
              nullable: true
            belongsToDashboard:
              type: boolean
            savedChartUuid:
              type: string
              nullable: true
            hideTitle:
              type: boolean
            title:
              type: string
          required:
          - savedChartUuid
          type: object
        type:
          $ref: '#/components/schemas/DashboardTileTypes.SAVED_CHART'
      required:
      - properties
      - type
      type: object
    VizTableConfig:
      allOf:
      - $ref: '#/components/schemas/VizBaseConfig'
      - properties:
          display:
            $ref: '#/components/schemas/VizTableDisplay'
          columns:
            $ref: '#/components/schemas/VizColumnsConfig'
          type:
            $ref: '#/components/schemas/ChartKind.TABLE'
        required:
        - columns
        - type
        type: object
    ProjectMemberRole:
      enum:
      - viewer
      - interactive_viewer
      - editor
      - developer
      - admin
      type: string
    TreemapChart:
      properties:
        endColorThreshold:
          type: number
          format: double
          description: Value threshold for end color
        startColorThreshold:
          type: number
          format: double
          description: Value threshold for start color
        useDynamicColors:
          type: boolean
          description: Use dynamic color scaling based on values
        endColor:
          type: string
          description: End color for color gradient (hex code)
        startColor:
          type: string
          description: Start color for color gradient (hex code)
        colorMetricId:
          type: string
          description: Field ID for node color value
        sizeMetricId:
          type: string
          description: Field ID for node size
        groupFieldIds:
          items:
            type: string
          type: array
          description: Field IDs for hierarchical grouping
        leafDepth:
          type: number
          format: double
          description: Depth of leaf nodes to display
        visibleMin:
          type: number
          format: double
          description: Minimum size for visible nodes
      type: object
    DashboardDataAppTile:
      allOf:
      - $ref: '#/components/schemas/DashboardTileBase'
      - $ref: '#/components/schemas/DashboardDataAppTileProperties'
    Record_string.Partial_PieChartValueOptions__:
      properties: {}
      additionalProperties:
        $ref: '#/components/schemas/Partial_PieChartValueOptions_'
      type: object
      description: Construct a type with a set of properties K of type T
    CartesianSeriesType:
      enum:
      - line
      - bar
      - scatter
      - area
      type: string
    FrameBoundaryType:
      enum:
      - unbounded_preceding
      - preceding
      - current_row
      - following
      - unbounded_following
      type: string
    Pick_Dashboard.uuid-or-name_:
      properties:
        name:
          type: string
        uuid:
          type: string
      required:
      - name
      - uuid
      type: object
      description: From T, pick a set of properties whose keys are in the union K
    SchedulerCsvOptions:
      properties:
        exportPivotedData:
          type: boolean
        asAttachment:
          type: boolean
        limit:
          anyOf:
          - type: number
            format: double
          - type: string
            enum:
            - table
            - all
        formatted:
          type: boolean
      required:
