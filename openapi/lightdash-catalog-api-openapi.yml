                type: object
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get catalog analytics for tables
      summary: Get table analytics
      tags:
      - Catalog
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - description: Table name to get analytics for
        in: path
