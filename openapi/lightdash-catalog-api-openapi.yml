openapi: 3.0.0
info:
  title: Lightdash AiAgents Catalog API
  version: 0.3156.1
  description: 'Open API documentation for all public Lightdash API endpoints. # Authentication Before you get started, you might need to create a Personal Access Token to authenticate via the API. You can create a token by following this guide: https://docs.lightdash.com/references/personal_tokens

    '
  license:
    name: MIT
  contact:
    name: Lightdash Support
    email: support@lightdash.com
    url: https://docs.lightdash.com/help-and-contact/contact/contact_info/
servers:
- url: /
tags:
- name: Catalog
paths:
  /api/v1/projects/{projectUuid}/dataCatalog:
    get:
      operationId: getCatalog
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                properties:
                  results:
                    $ref: '#/components/schemas/ApiCatalogResults'
                  status:
                    type: string
                    enum:
                    - ok
                    nullable: false
                required:
                - results
                - status
                type: object
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get catalog items
      summary: Get catalog
      tags:
      - Catalog
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - in: query
        name: search
        required: false
        schema:
          type: string
      - in: query
        name: type
        required: false
        schema:
          $ref: '#/components/schemas/CatalogType'
      - in: query
        name: filter
        required: false
        schema:
          $ref: '#/components/schemas/CatalogFilter'
  /api/v1/projects/{projectUuid}/dataCatalog/metrics/trees:
    get:
      operationId: getMetricsTrees
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiGetMetricsTreesResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: List saved metrics trees for a project
      summary: List metrics trees
      tags:
      - Catalog
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - description: Page number (1-indexed)
        in: query
        name: page
        required: false
        schema:
          format: double
          type: number
      - description: Number of trees per page
        in: query
        name: pageSize
        required: false
        schema:
          format: double
          type: number
    post:
      operationId: createMetricsTree
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiCreateMetricsTreeResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Create a new saved metrics tree with nodes and edges
      summary: Create metrics tree
      tags:
      - Catalog
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiCreateMetricsTreePayload'
  /api/v1/projects/{projectUuid}/dataCatalog/metrics/trees/{metricsTreeUuidOrSlug}:
    get:
      operationId: getMetricsTreeDetails
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiGetMetricsTreeResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get details of a saved metrics tree including nodes and edges
      summary: Get metrics tree details
      tags:
      - Catalog
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - in: path
        name: metricsTreeUuidOrSlug
        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/dataCatalog/metrics/trees/{metricsTreeUuid}:
    patch:
      operationId: updateMetricsTree
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiUpdateMetricsTreeResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Update a saved metrics tree including nodes and edges
      summary: Update metrics tree
      tags:
      - Catalog
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - in: path
        name: metricsTreeUuid
        required: true
        schema:
          type: string
      requestBody:
        description: Updated tree data including nodes and edges
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiUpdateMetricsTreePayload'
              description: Updated tree data including nodes and edges
    delete:
      operationId: deleteMetricsTree
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessEmpty'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Delete a saved metrics tree and its associated nodes
      summary: Delete metrics tree
      tags:
      - Catalog
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - in: path
        name: metricsTreeUuid
        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/dataCatalog/metrics/trees/{metricsTreeUuid}/lock:
    post:
      operationId: acquireMetricsTreeLock
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMetricsTreeLockResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Acquire an edit lock on a metrics tree
      summary: Acquire tree lock
      tags:
      - Catalog
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - in: path
        name: metricsTreeUuid
        required: true
        schema:
          type: string
    delete:
      operationId: releaseMetricsTreeLock
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessEmpty'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Release an edit lock on a metrics tree
      summary: Release tree lock
      tags:
      - Catalog
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - in: path
        name: metricsTreeUuid
        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/dataCatalog/metrics/trees/{metricsTreeUuid}/lock/heartbeat:
    put:
      operationId: refreshMetricsTreeLockHeartbeat
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccessEmpty'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Refresh the heartbeat on an edit lock to keep it alive
      summary: Refresh tree lock heartbeat
      tags:
      - Catalog
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - in: path
        name: metricsTreeUuid
        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/dataCatalog/{table}/metadata:
    get:
      operationId: getMetadata
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                properties:
                  results:
                    $ref: '#/components/schemas/ApiCatalogMetadataResults'
