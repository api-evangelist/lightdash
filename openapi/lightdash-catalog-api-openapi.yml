        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/dataCatalog/{table}/analytics/{field}:
    get:
      operationId: getAnalyticsField
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                properties:
                  results:
                    $ref: '#/components/schemas/ApiCatalogAnalyticsResults'
                  status:
                    type: string
                    enum:
                    - ok
                    nullable: false
                required:
                - results
                - status
                type: object
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get catalog analytics for fields
      summary: Get field analytics
      tags:
      - Catalog
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - description: Table where this field belongs
        in: path
        name: table
        required: true
        schema:
          type: string
      - description: Field name to get analytics for
        in: path
        name: field
        required: true
        schema:
          type: string
