openapi: 3.0.0
info:
  title: Lightdash AiAgents Changesets API
  version: 0.3156.1
  description: 'Open API documentation for all public Lightdash API endpoints. # Authentication Before you get started, you might need to create a Personal Access Token to authenticate via the API. You can create a token by following this guide: https://docs.lightdash.com/references/personal_tokens

    '
  license:
    name: MIT
  contact:
    name: Lightdash Support
    email: support@lightdash.com
    url: https://docs.lightdash.com/help-and-contact/contact/contact_info/
servers:
- url: /
tags:
- name: Changesets
paths:
  /api/v1/projects/{projectUuid}/changesets:
    get:
      operationId: listActiveChangesetWithChanges
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiChangesetsResponseTSOACompat'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get active changeset for a project
      summary: List changesets
      tags:
      - Changesets
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/changesets/changes/{changeUuid}:
    get:
      operationId: getChange
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiGetChangeResponseTSOACompat'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Get a specific change by UUID
      summary: Get change
      tags:
      - Changesets
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - in: path
        name: changeUuid
        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/changesets/changes/{changeUuid}/revert:
    post:
      operationId: revertChange
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiRevertChangeResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Revert a specific change
      summary: Revert change
      tags:
      - Changesets
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
      - in: path
        name: changeUuid
        required: true
        schema:
          type: string
  /api/v1/projects/{projectUuid}/changesets/revert-all:
    post:
      operationId: revertAllChanges
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiRevertChangeResponse'
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
      description: Revert all changes in the active changeset
      summary: Revert all changes
      tags:
      - Changesets
      security: []
      parameters:
      - in: path
        name: projectUuid
        required: true
        schema:
          type: string
components:
  schemas:
    AnyType:
      description: 'This AnyType is an alias for any

        The goal is to make it easier to identify any type in the codebase

        without having to eslint-disable all the time

        These are only used on legacy `any` types, don''t use it for new types.

        This is added on a separate file to avoid circular dependencies.'
    ApiErrorPayload:
      properties:
        error:
          properties:
            data:
              $ref: '#/components/schemas/AnyType'
              description: Optional data containing details of the error
            message:
              type: string
              description: A friendly message summarising the error
            name:
              type: string
              description: Unique name for the type of error
            statusCode:
              type: number
              format: integer
              description: HTTP status code
          required:
          - name
          - statusCode
          type: object
        status:
          type: string
          enum:
          - error
          nullable: false
      required:
      - error
      - status
      type: object
      description: 'The Error object is returned from the api any time there is an error.

        The message contains'
    ApiSuccessEmpty:
      properties:
        results: {}
        status:
          type: string
          enum:
          - ok
          nullable: false
      required:
      - status
      type: object
    ApiRevertChangeResponse:
      $ref: '#/components/schemas/ApiSuccessEmpty'
    Record_string.unknown_:
      properties: {}
      additionalProperties: {}
      type: object
      description: Construct a type with a set of properties K of type T
    ApiGetChangeResponseTSOACompat:
      properties:
        results:
          $ref: '#/components/schemas/ChangeTSOACompat'
        status:
          type: string
          enum:
          - ok
          nullable: false
      required:
      - results
      - status
      type: object
    ChangesetTSOACompat:
      $ref: '#/components/schemas/Record_string.unknown_'
    ChangeTSOACompat:
      $ref: '#/components/schemas/Record_string.unknown_'
    ApiChangesetsResponseTSOACompat:
      properties:
        results:
          items:
            $ref: '#/components/schemas/ChangesetTSOACompat'
          type: array
        status:
          type: string
          enum:
          - ok
          nullable: false
      required:
      - results
      - status
      type: object
  securitySchemes:
    session_cookie:
      type: apiKey
      in: cookie
      name: connect.sid
    api_key:
      type: apiKey
      in: header
      name: Authorization
      description: Value should be 'ApiKey <your key>'
