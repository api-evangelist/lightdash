specificationVersion: '0.19'
description: >
  Lightdash is an open-source business intelligence platform built on top of dbt that connects
  directly to the semantic layer defined in dbt projects. It provides a REST API covering core
  data operations including catalog management, chart and dashboard CRUD, SQL runner queries,
  scheduling and automated deliveries, user and access control, AI agent threads, and integrations
  with GitHub, GitLab, Slack, and Google Sheets. Authentication uses Personal Access Tokens
  passed via the Authorization header. Lightdash is available as a managed cloud service or
  self-hosted, with pricing based on cloud-hosted plans or free open-source self-hosting.
